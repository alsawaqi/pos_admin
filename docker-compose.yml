services:
  pos_admin:
    build:
      context: .
      dockerfile: docker/dev/php/php.dockerfile
    # user: "1000:1000" # your UID:GID  
    volumes:
      - ./src:/var/www/html
    command: >
      sh -c "chown -R www-data:www-data /var/www/html/storage /var/www/html/bootstrap/cache && php-fpm"  
    depends_on:
       - redis
    networks:
      - charity_net

  nginx:
    image: nginx:latest
    ports:
      - "8086:80"
    volumes:
      - ./src:/var/www/html
      - ./docker/dev/nginx/default.conf:/etc/nginx/conf.d/default.conf
    networks:
      - charity_net

  artisan:
    build:
      context: .
      dockerfile: docker/dev/artisan/artisan.dockerfile
    volumes:
      - ./src:/var/www/html
    networks:
      - charity_net
    depends_on:
      - pos_admin
      - redis

  vite:
      image: node:20-alpine
      working_dir: /var/www/html
      volumes:
         - ./src:/var/www/html
      ports:
        - "5174:5174"
      environment:
        - CHOKIDAR_USEPOLLING=true
        - CHOKIDAR_INTERVAL=200
      command: sh -c "npm install && npm run dev"
      networks:
        - charity_net    

  composer:
    image: composer:latest
    container_name: composer_pos_admin
    volumes:
      - ./src:/app
    working_dir: /app
    command: install
    networks:
      - charity_net
      

  redis:
    image: redis:8-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    ports:
      - "6380:6379"
    volumes:
      - redis-data:/data
    networks:
      - charity_net
networks:
  charity_net:
    external: true

volumes:
  redis-data:
