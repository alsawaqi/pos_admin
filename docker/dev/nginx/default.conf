server {
    listen 80;
    index index.php index.html;
    server_name localhost;
    root /var/www/html/public;

    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    location ~ \.php$ {
        include fastcgi_params;
        fastcgi_pass pos_admin:9000;
        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;
        fastcgi_index index.php;
        fastcgi_read_timeout 300;
        # The login response carries a large CSP header (Google Maps
        # domains) plus several Set-Cookie headers (session regenerate +
        # CSRF), which overflow nginx's default 4k/8k header buffer and
        # 502 with "upstream sent too big header". Roomy buffers fix it.
        fastcgi_buffer_size 32k;
        fastcgi_buffers 8 16k;
        fastcgi_busy_buffers_size 32k;
    }

    location ~ /\.ht {
        deny all;
    }
}
