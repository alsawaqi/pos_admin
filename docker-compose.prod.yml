# =============================================================================
# pos_admin — PRODUCTION stack  (posadmin.mithqal.net)
# =============================================================================
# Joins the EXISTING external `charity_net` network and shares the charity
# Postgres (host `chariyt-db`, database `charity_db`) with the charity API and
# pos_merchant. pos_admin owns the pos_* schema and tracks its migrations in
# its OWN `pos_admin_migrations` table — see ./src/.env (DB_MIGRATIONS_TABLE).
#
# Migration safety (shared DB): `php artisan migrate --force` is ADDITIVE — it
# only runs pos_admin's own un-run migrations and records them in
# pos_admin_migrations, never charity's `migrations` table. The 6 ensure_*_stub
# migrations are `Schema::hasTable()`-guarded no-ops in production, and no pos
# migration drops/alters a charity table. NEVER run migrate:fresh / migrate:reset
# / migrate:rollback / db:wipe against this database.
#
# Runtime (app + nginx + redis):
#   docker compose -f docker-compose.prod.yml up -d --build
# Deploy one-shots are profile-gated — see ./DEPLOY.md.
#
# nginx has NO host ports: it exposes :80 on charity_net under the alias
# `pos-admin-web`. Point the host reverse proxy / TLS terminator at it:
#   posadmin.mithqal.net  ->  pos-admin-web:80
# =============================================================================

services:
  # ---- PHP-FPM application (long-running) ----
  pos_admin:
    image: pos-admin-app
    build:
      context: .
      dockerfile: docker/prod/php/php.dockerfile
    restart: unless-stopped
    volumes:
      - ./src:/var/www/html
      - storage-data:/var/www/html/storage
      - cache-data:/var/www/html/bootstrap/cache
    # APP_ENV/APP_DEBUG are forced here so a stale .env can't ship debug on.
    # Laravel's Dotenv does NOT override real env vars, so these win over .env.
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
      LOG_CHANNEL: stderr
    depends_on:
      - pos_admin_redis
    networks:
      - charity_net

  # ---- nginx (serves /public, FastCGI -> pos_admin:9000) ----
  nginx:
    image: nginx:1.25-alpine
    restart: unless-stopped
    depends_on:
      - pos_admin
    volumes:
      - ./src/public:/var/www/html/public:ro
      - storage-data:/var/www/html/storage
      - ./docker/prod/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    read_only: true
    tmpfs:
      - /var/cache/nginx
      - /var/run
      - /tmp
    expose:
      - "80"
    networks:
      charity_net:
        aliases:
          - pos-admin-web

  # ---- Redis (sessions + cache + queue). Unique name on charity_net so it
  #      doesn't DNS-collide with charity's / pos_merchant's redis. ----
  pos_admin_redis:
    image: redis:8-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis-data:/data
    networks:
      - charity_net

  # ===========================================================================
  # One-shot deploy helpers — profile-gated, run explicitly (see DEPLOY.md).
  # ===========================================================================

  # `--profile build`: PHP deps into ./src/vendor
  composer:
    profiles: ["build"]
    image: composer:2
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
    command: composer install --no-dev --optimize-autoloader --no-interaction
    networks:
      - charity_net

  # `--profile build`: Vite assets into ./src/public/build
  node-build:
    profiles: ["build"]
    image: node:20-alpine
    working_dir: /var/www/html
    volumes:
      - ./src:/var/www/html
    command: sh -lc "npm ci && npm run build"
    networks:
      - charity_net

  # `--profile migrate`: ADDITIVE migrations only (see safety note up top).
  artisan:
    profiles: ["migrate"]
    image: pos-admin-app
    working_dir: /var/www/html
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    volumes:
      - ./src:/var/www/html
      - storage-data:/var/www/html/storage
      - cache-data:/var/www/html/bootstrap/cache
    command: php artisan migrate --force
    restart: "no"
    networks:
      - charity_net

  # `--profile deploy`: rebuild Laravel caches after a code/asset deploy
  deploy:
    profiles: ["deploy"]
    image: pos-admin-app
    working_dir: /var/www/html
    environment:
      APP_ENV: production
      APP_DEBUG: "false"
    volumes:
      - ./src:/var/www/html
      - storage-data:/var/www/html/storage
      - cache-data:/var/www/html/bootstrap/cache
    entrypoint: ["sh", "-lc"]
    command: |
      php artisan optimize:clear
      php artisan config:cache
      php artisan route:cache
      php artisan view:cache
    restart: "no"
    networks:
      - charity_net

  # `--profile init`: one-time storage/cache permissions on the named volumes
  init-perms:
    profiles: ["init"]
    image: pos-admin-app
    user: "0:0"
    volumes:
      - storage-data:/var/www/html/storage
      - cache-data:/var/www/html/bootstrap/cache
    entrypoint: ["sh", "-lc"]
    command: |
      set -e
      mkdir -p /var/www/html/storage/framework/cache \
               /var/www/html/storage/framework/sessions \
               /var/www/html/storage/framework/views \
               /var/www/html/storage/logs \
               /var/www/html/bootstrap/cache
      chown -R www-data:www-data /var/www/html/storage /var/www/html/bootstrap/cache
      chmod -R ug+rwX /var/www/html/storage /var/www/html/bootstrap/cache
    restart: "no"
    networks:
      - charity_net

networks:
  charity_net:
    external: true

volumes:
  storage-data:
  cache-data:
  redis-data:
