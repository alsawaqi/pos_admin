# Phase D9 — CI for pos_admin (Laravel app lives in src/).
#
# Tests run on sqlite :memory: (pinned by src/phpunit.xml), so CI never
# touches the shared live charity_db and a per-run key:generate is safe —
# the shared-APP_KEY constraint only applies to the live stack.
#
# NOTE: GitHub's setup-php enables intl by default but the production
# containers do NOT ship it — avoid intl-dependent code paths (Number::format
# etc.); green CI does not prove them safe in the real containers.
name: CI

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

defaults:
  run:
    working-directory: src

jobs:
  php-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with:
          php-version: '8.4' # containers run 8.4.x (composer.json allows ^8.3)
          extensions: ctype, curl, dom, fileinfo, filter, gd, iconv, mbstring, openssl, pcntl, pdo_sqlite, sqlite3, simplexml, tokenizer, xml, xmlreader, xmlwriter, zip, zlib
          ini-values: memory_limit=1G
          coverage: none
      - name: Composer cache dir
        id: cc
        run: echo "dir=$(composer config cache-files-dir)" >> "$GITHUB_OUTPUT"
      - uses: actions/cache@v4
        with:
          path: ${{ steps.cc.outputs.dir }}
          key: ${{ runner.os }}-composer-admin-${{ hashFiles('src/composer.lock') }}
          restore-keys: ${{ runner.os }}-composer-admin-
      # A fresh checkout has no storage/ skeleton (untracked): without
      # framework/views any Blade render (PDF export, error pages) 500s
      # with "Please provide a valid cache path".
      - run: mkdir -p storage/framework/cache storage/framework/sessions storage/framework/testing storage/framework/views storage/logs bootstrap/cache
      - run: composer install --prefer-dist --no-interaction --no-progress
      - run: cp .env.example .env && php artisan key:generate
      - run: php artisan config:clear && vendor/bin/pest

  frontend-typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20' # vite containers run node 20
          cache: npm
          cache-dependency-path: src/package-lock.json
      - run: npm ci
      - run: npm run typecheck
      - run: npm run build

  # ---- CD: auto-deploy to the production VPS ----
  # Push to main only (never PRs), and only after every test job is green.
  # SSHes into the VPS, pulls, and runs deploy/deploy.sh — the same
  # documented sequence as a manual release, ending in a health check.
  # Secrets: VPS_HOST, VPS_USER, VPS_SSH_KEY (the dedicated gha-pos-deploy
  # key), VPS_KNOWN_HOSTS (pinned host key).
  deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    needs: [php-tests, frontend-typecheck]
    runs-on: ubuntu-latest
    concurrency:
      group: prod-deploy-pos-admin
      cancel-in-progress: false
    defaults:
      run:
        working-directory: .
    steps:
      - name: Prepare SSH
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          printf '%s\n' "${{ secrets.VPS_KNOWN_HOSTS }}" > ~/.ssh/known_hosts
      - name: Pull + deploy on the VPS
        run: |
          ssh -i ~/.ssh/deploy_key -o BatchMode=yes "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            'cd ~/pos_admin && git pull --ff-only && bash deploy/deploy.sh'
